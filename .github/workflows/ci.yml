name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ca-central-1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install "python-telegram-bot[job-queue]" python-dotenv pytest pytest-asyncio

      - name: Run tests
        run: pytest -v
        env:
          TELEGRAM_TOKEN: dummy
          TELEGRAM_GROUP: -1001234567890

  build-and-deploy:
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: tengri-bot
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to Lightsail
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          # Pass host credentials so the remote aws command uses them instead of instance role
          HOST_AWS_ACCESS_KEY_ID: ${{ secrets.HOST_AWS_ACCESS_KEY_ID }}
          HOST_AWS_SECRET_ACCESS_KEY: ${{ secrets.HOST_AWS_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key ubuntu@$HOST "export AWS_ACCESS_KEY_ID='$HOST_AWS_ACCESS_KEY_ID' && export AWS_SECRET_ACCESS_KEY='$HOST_AWS_SECRET_ACCESS_KEY' && export ECR_REGISTRY=$ECR_REGISTRY && cd /opt/tengri-bot && aws ecr get-login-password --region ca-central-1 | docker login --username AWS --password-stdin \$ECR_REGISTRY && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d"
